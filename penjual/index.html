<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyBite Penjual Panel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #FFFFDC; color: #334155; padding: 2rem; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: #F28B2A; margin-bottom: 2rem; font-size: 2rem; }
        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media (min-width: 768px) { .grid-layout { grid-template-columns: 1fr 2fr; } }
        
        .card { background-color: #ffffff; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card-form { border-top: 4px solid #F28B2A; height: fit-content; }
        .card-table { border-top: 4px solid #F28B2A; overflow-x: auto; }
        h2 { font-size: 1.25rem; margin-bottom: 1rem; color: #1e293b; }
        
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 4px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #06b6d4; box-shadow: 0 0 0 2px #ecfeff; }
        
        button { width: 100%; background-color: #F28B2A; color: black; font-weight: bold; padding: 0.6rem 1rem; border: none; border-radius: 4px; cursor: pointer; transition: background-color 0.2s; margin-top: 0.5rem; }
        button:hover { background-color: #b37921; }
        
        .btn-cancel { background-color: #94a3b8; color: white; display: none; } /* Tombol batal disembunyikan awalnya */
        .btn-cancel:hover { background-color: #64748b; }

        .btn-edit { background-color: #3b82f6; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin-right: 5px; }
        .btn-edit:hover { background-color: #2563eb; }

        .btn-delete { background-color: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn-delete:hover { background-color: #dc2626; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 0.75rem; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f1f5f9; color: #475569; font-weight: 600; }
        tbody tr:hover { background-color: #f8fafc; }
        .text-center { text-align: center; }
        .text-red { color: #ef4444; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Dashboard Penjual JoyBite</h1>
        <div style="text-align: right; margin-bottom: 1rem;">
            <button onclick="logout()" style="width: auto; background-color: #ef4444; color: white;">Keluar / Logout</button>
        </div>

        <div class="grid-layout">
            
            <div class="card card-form">
                <h2 id="formTitle">Tambah Dessert Baru</h2>
                <form id="formTambah">
                    <input type="hidden" id="edit_id">

                    <div class="form-group">
                        <label>Nama Dessert</label>
                        <input type="text" id="nama" required>
                    </div>
                    <div class="form-group">
                        <label>Harga (Rp)</label>
                        <input type="number" id="harga" required>
                    </div>
                    <div class="form-group">
                        <label>Stok</label>
                        <input type="number" id="stok" required>
                    </div>
                    
                    <button type="submit" id="btnSubmit">Simpan Dessert</button>
                    <button type="button" class="btn-cancel" id="btnCancel" onclick="batalEdit()">Batal Edit</button>
                </form>
            </div>

            <div class="card card-table">
                <h2>Daftar Menu Tersedia</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nama Dessert</th>
                            <th>Harga</th>
                            <th>Stok</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelDessert">
                        </tbody>
                </table>
            </div>

        </div>
    </div>

    <script>
    
if(localStorage.getItem("isLoggedIn") !== "true") {
    window.location.href = "../login.html";
}

// Fungsi untuk Logout
function logout() {
    localStorage.removeItem("isLoggedIn");
    localStorage.removeItem("role");
    localStorage.removeItem("id_user");
    localStorage.removeItem("username");
    window.location.href = "../login.html"; 
}

        const baseURL = 'http://localhost/api_joybite/penjual';

        function muatDataDessert() {
            fetch(`${baseURL}/get_dessert.php`)
                .then(response => response.json())
                .then(hasil => {
                    const tabel = document.getElementById('tabelDessert');
                    tabel.innerHTML = ''; 

                    if (hasil.status === "success") {
                        hasil.data.forEach(item => {
                            // nambahin parameter data ke fungsi editDessert saat tombol diklik
                            tabel.innerHTML += `
                                <tr>
                                    <td>${item.id}</td>
                                    <td><strong>${item.nama_dessert}</strong></td>
                                    <td>Rp ${item.harga}</td>
                                    <td>${item.stok} pcs</td>
                                    <td>
                                        <button class="btn-edit" onclick="editDessert('${item.id}', '${item.nama_dessert}', '${item.harga}', '${item.stok}')">Edit</button>
                                        <button class="btn-delete" onclick="hapusDessert(${item.id})">Hapus</button>
                                    </td>
                                </tr>
                            `;
                        });
                    } else {
                        tabel.innerHTML = `<tr><td colspan="5" class="text-center text-red">${hasil.message}</td></tr>`;
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        }

        function hapusDessert(id) {
            if (confirm("Apakah kamu yakin ingin menghapus menu ini?")) {
                fetch(`${baseURL}/delete.php?id=${id}`)
                    .then(response => response.json())
                    .then(hasil => {
                        if (hasil.status === "success") {
                            alert(hasil.message);
                            muatDataDessert();
                        } else {
                            alert("Gagal menghapus: " + hasil.message);
                        }
                    })
                    .catch(error => console.error('Error:', error));
            }
        }

        // isi form dengan data yang mau diedit
        function editDessert(id, nama, harga, stok) {
            document.getElementById('edit_id').value = id;
            document.getElementById('nama').value = nama;
            document.getElementById('harga').value = harga;
            document.getElementById('stok').value = stok;

            // ubah tampilan form agar sesuai dengan mode edit
            document.getElementById('formTitle').innerText = "Update Dessert";
            document.getElementById('btnSubmit').innerText = "Simpan Perubahan";
            document.getElementById('btnCancel').style.display = "block"; // tombol batal
        }

        // buat cancel mode edit dan kembali ke mode tambah
        function batalEdit() {
            document.getElementById('formTambah').reset(); // buat kosongin form
            document.getElementById('edit_id').value = "";
            
            // kembalikan tampilan form ke awal
            document.getElementById('formTitle').innerText = "Tambah Dessert Baru";
            document.getElementById('btnSubmit').innerText = "Simpan Dessert";
            document.getElementById('btnCancel').style.display = "none"; // hidden tombol batal
        }

        document.getElementById('formTambah').addEventListener('submit', function(e) {
            e.preventDefault(); 

            // buat cek ada id baru
            const idEdit = document.getElementById('edit_id').value;
            const urlTarget = idEdit ? `${baseURL}/update_dessert.php` : `${baseURL}/add_dessert.php`;

            const dataKirim = {
                id: idEdit, // edit id 
                nama_dessert: document.getElementById('nama').value,
                harga: document.getElementById('harga').value,
                stok: document.getElementById('stok').value
            };

            fetch(urlTarget, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataKirim)
            })
            .then(response => response.json())
            .then(hasil => {
                if(hasil.status === "success") {
                    alert("Berhasil: " + hasil.message);
                    batalEdit(); // kosongin dan kembalikan form ke mode awal
                    muatDataDessert(); // refresh tabel
                } else {
                    alert("Gagal: " + hasil.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Terjadi kesalahan jaringan.");
            });
        });

        // panggil saat pertama kali buka
        muatDataDessert();
    </script>
</body>
</html>
